name: openwispr
options:
  bundleIdPrefix: dev.smathdaddy.openwispr.ios
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO
targets:
  OpenwisprIOS:
    type: application
    platform: iOS
    sources:
      - OpenwisprIOS
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.smathdaddy.openwispr.ios
        INFOPLIST_FILE: OpenwisprIOS/Info.plist
        CODE_SIGN_ENTITLEMENTS: OpenwisprIOS/OpenwisprIOS.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
    dependencies:
      - target: OpenwisprKeyboard
  OpenwisprKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - OpenwisprKeyboard
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.smathdaddy.openwispr.ios.keyboard
        INFOPLIST_FILE: OpenwisprKeyboard/Info.plist
        CODE_SIGN_ENTITLEMENTS: OpenwisprKeyboard/OpenwisprKeyboard.entitlements
